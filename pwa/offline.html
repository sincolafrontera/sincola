<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sin conexión · SinCola</title>
<style>
  :root { --accent: #f97316; --bg: #0a0c10; --text: #e8eaf0; --muted: #6b7280; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .wrap { max-width: 400px; }
  .icon { font-size: 4rem; margin-bottom: 24px; }
  h1 {
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #f97316, #f43f5e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  p { color: var(--muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 28px; }
  .btn {
    display: inline-block;
    padding: 13px 28px;
    background: var(--accent);
    color: #fff;
    border-radius: 12px;
    font-weight: 700;
    font-size: 0.9rem;
    text-decoration: none;
    cursor: pointer;
    border: none;
  }
  .cached-note {
    margin-top: 20px;
    font-size: 0.75rem;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">📡</div>
  <h1>Sin conexión</h1>
  <p>No hay conexión a internet. Los datos de la frontera se actualizan en tiempo real y necesitan conexión para funcionar.</p>
  <button class="btn" onclick="window.location.reload()">Reintentar</button>
  <p class="cached-note">Si tenías datos cargados antes, vuelve atrás en tu navegador para verlos.</p>
</div>
</body>
</html>
